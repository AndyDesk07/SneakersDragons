<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SNEAKERS DRAGONS | Stock System</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <canvas id="sneaker-rain"></canvas>
    
    <div id="alert-msg">ACCIÓN COMPLETADA CON EXITO!🔥</div>

    <header>
        <h1>SNEAKERS DRAGONS🐉</h1>
        <p class="subtitle">CONTROL GENERAL DE STOCK</p>
    </header>

    <div class="frase-futuro">
        <span>SE EL PRIMERO EN PISAR EL FUTURO🔥</span>
    </div>

    <main class="main-content">
        <section class="form-container">
            <form id="sneaker-form">
                <input type="hidden" id="edit-index" value="-1">
                
                <label>Modelo de Zapatilla:</label>
                <div class="hybrid-select">
                    <input type="text" id="model" placeholder="Escribe o selecciona..." autocomplete="off" required>
                    <div id="select-options" class="options-container"></div>
                </div>
                
                <label>Precio de Venta (CLP)</label>
                <input type="number" id="price" placeholder="Ingresa un precio:" required>
                
                <label>Cantidad en Stock</label>
                <input type="number" id="stock" placeholder="Ej: 10" required>
                
                <label>Categoría</label>
                <select id="category">
                    <option value="Urbano">Urbano</option>
                    <option value="Retro">Retro</option>
                    <option value="Deportivo">Deportivo</option>
                </select>
                
                <button type="submit" id="btn-add">AGREGAR AL STOCK</button>
            </form>
        </section>

        <section id="inventory-list"></section>
    </main>

    <script src="script.js"></script>
</body>
</html>
